name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  CONFIGURATION: RelWithDebInfo

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: f8be6942c0c5abd48bb325726d57af9ac39e251d

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.CONFIGURATION }} `
            -DCMAKE_CXX_STANDARD=20 `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.CONFIGURATION }}

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Deploy
        run: |
          cmake --install build --prefix build/dist --config ${{ env.CONFIGURATION }}
          windeployqt6 build\dist\bin\aictl.exe --no-translations --no-opengl-sw --no-system-d3d-compiler

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aictl-windows-x64
          path: build/dist/bin/
          retention-days: 7
