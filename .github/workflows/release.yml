name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  CONFIGURATION: RelWithDebInfo

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: ''

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: f8be6942c0c5abd48bb325726d57af9ac39e251d

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build --config ${{ env.CONFIGURATION }}

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Deploy
        run: |
          cmake --install build --prefix build/dist --config ${{ env.CONFIGURATION }}
          windeployqt6 build\dist\bin\aictl.exe --no-translations --no-opengl-sw --no-system-d3d-compiler

      - name: Package
        run: Compress-Archive -Path build\dist\bin\* -DestinationPath aictl-${{ github.ref_name }}-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: aictl-*-windows-x64.zip
